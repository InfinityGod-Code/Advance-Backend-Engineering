<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <defs>
    <!-- Rainy & Green Calming Gradients -->
    <linearGradient id="rainyBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef5f3"/>
      <stop offset="40%" stop-color="#e2ede9"/>
      <stop offset="100%" stop-color="#d3e4de"/>
    </linearGradient>
    
    <linearGradient id="leafGrad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d5a27" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4e8d44" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="leafGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6fa366" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b6e35" stop-opacity="0.03"/>
    </linearGradient>

    <linearGradient id="nodeGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3cbd2"/>
      <stop offset="100%" stop-color="#7da88a"/>
    </linearGradient>
    
    <linearGradient id="nodeBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b2c8df"/>
      <stop offset="100%" stop-color="#8ba3c7"/>
    </linearGradient>
  </defs>

  <!-- Background Layer -->
  <rect width="1200" height="300" fill="url(#rainyBg)"/>

  <!-- Falling Rain Drops (Safe vector lines) -->
  <g stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.5">
    <line x1="100" y1="20" x2="92" y2="60" />
    <line x1="250" y1="10" x2="242" y2="50" />
    <line x1="400" y1="50" x2="392" y2="90" />
    <line x1="550" y1="15" x2="542" y2="55" />
    <line x1="700" y1="30" x2="692" y2="70" />
    <line x1="850" y1="10" x2="842" y2="50" />
    <line x1="1000" y1="40" x2="992" y2="80" />
    <line x1="1150" y1="20" x2="1142" y2="60" />
    <line x1="50" y1="150" x2="42" y2="190" />
    <line x1="200" y1="180" x2="192" y2="220" />
    <line x1="350" y1="130" x2="342" y2="170" />
    <line x1="600" y1="160" x2="592" y2="200" />
    <line x1="780" y1="140" x2="772" y2="180" />
    <line x1="920" y1="170" x2="912" y2="210" />
    <line x1="1080" y1="130" x2="1072" y2="170" />
  </g>

  <!-- Foliage / Leaf Vectors -->
  <path d="M -20,320 C 50,250 120,220 100,320 Z" fill="url(#leafGrad1)" />
  <path d="M 40,320 C 120,200 200,240 180,320 Z" fill="url(#leafGrad2)" />
  <path d="M -50,180 C 30,150 80,220 20,320 Z" fill="url(#leafGrad1)" opacity="0.7"/>
  <path d="M 1050,320 C 1100,180 1220,150 1220,320 Z" fill="url(#leafGrad1)" />
  <path d="M 980,320 C 1050,220 1150,200 1160,320 Z" fill="url(#leafGrad2)" />

  <!-- Safe, Pre-built System Typography Layout -->
  <g transform="translate(80, 145)">
    <text font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif" font-size="52" font-weight="800" fill="#1c3d37">Advance-Backend-Engineering</text>
  </g>
  <g transform="translate(85, 195)">
    <text font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif" font-size="22" font-weight="500" fill="#617d78">Efficient  •  Scalable  •  Modern</text>
  </g>

  <!-- Backend Infrastructure Network Architecture Map -->
  <g transform="translate(950, 70)">
    <path d="M 20,90 Q 55,20 110,30" fill="none" stroke="#8fa8a1" stroke-width="2.5" stroke-dasharray="4,4"/>
    <path d="M 20,90 Q 70,100 110,130" fill="none" stroke="#8fa8a1" stroke-width="2.5"/>
    <path d="M 110,30 L 110,130" fill="none" stroke="#8fa8a1" stroke-width="2"/>
    <path d="M 20,90 L 60,150" fill="none" stroke="#8fa8a1" stroke-width="2"/>
    <path d="M 60,150 L 110,130" fill="none" stroke="#8fa8a1" stroke-width="2"/>

    <!-- Nodes -->
    <circle cx="20" cy="90" r="20" fill="url(#nodeGreen)" />
    <circle cx="20" cy="90" r="7" fill="#ffffff" opacity="0.6"/>

    <circle cx="110" cy="30" r="24" fill="url(#nodeBlue)" />
    <circle cx="110" cy="30" r="9" fill="#ffffff" opacity="0.6"/>

    <circle cx="110" cy="130" r="22" fill="url(#nodeGreen)" />
    <circle cx="110" cy="130" r="8" fill="#ffffff" opacity="0.6"/>

    <circle cx="60" cy="150" r="14" fill="url(#nodeBlue)" />
  </g>
</svg>
